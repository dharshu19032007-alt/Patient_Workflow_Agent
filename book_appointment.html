<!DOCTYPE html>
<html>
<head>
    <title>Hospital Appointment Booking</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f4f4;
        }

        .container{
            width:400px;
            margin:60px auto;
            background:white;
            padding:25px;
            border-radius:8px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        label{
            display:block;
            margin-top:10px;
        }

        input,select{
            width:100%;
            padding:8px;
            margin-top:5px;
        }

        button{
            margin-top:15px;
            width:100%;
            padding:10px;
            background:#2c7be5;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#1a5fd0;
        }

        .message{
            margin-top:15px;
            color:green;
            text-align:center;
        }

        .error{
            margin-top:15px;
            color:red;
            text-align:center;
        }

    </style>
</head>

<body>

<div class="container">

<h2>Book Appointment</h2>

<form method="POST" action="/book">

<label>Patient ID</label>
<input type="number" name="patient_id" required>

<label>Patient Name</label>
<input type="text" name="patient_name" required>

<label>Issue / Symptom</label>
<select name="issue">
<option>General Checkup</option>
<option>Headache</option>
<option>Chest Pain</option>
<option>Bone Pain</option>
<option>Skin Allergy</option>
</select>

<label>Category</label>
<select name="category">
<option>Outpatient</option>
<option>Emergency</option>
</select>

<label>Date</label>
<input type="date" name="date" required>

<button type="submit">Book Appointment</button>

</form>

{% if message %}
<div class="message">{{ message }}</div>
{% endif %}

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

</div>

</body>
</html>
